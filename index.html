<!DOCTYPE html>
<html>
<head>
    <title>Złoty Zbieracz - Test</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { padding: 0; margin: 0; background: #111; font-family: sans-serif; }
        #map { height: 90vh; width: 100vw; }
        #naglowek { 
            height: 10vh; 
            background: #222; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            box-sizing: border-box;
        }
        .logo { color: #ffcc00; font-weight: bold; font-size: 1.1rem; }
        .status { background: #2ecc71; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="naglowek">
        <div class="logo">⚡ Złoty Zbieracz</div>
        <div class="status">● Tryb demo (Punkty wgrane)</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    
    <script>
        // 1. Centrujemy mapę na Gdańsk (dokładnie tam, gdzie patrzysz na screenie)
        const map = L.map('map').setView([54.4100, 18.6000], 13);

        // 2. Wczytujemy ciemny styl mapy
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 3. Wpisane na sztywno punkty dużego ruchu (Plaża Brzeźno, Jelitkowo, Park Reagana)
        // Format: [Szerokość, Długość, Moc plamy od 0.1 do 1.0]
        const punktyTłumu = [
            [54.4143, 18.6214, 0.95], // Molo w Brzeźnie (Mocna czerwień - tu był dziki tłum!)
            [54.4280, 18.5933, 0.75], // Jelitkowo wejście (Pomarańczowy)
            [54.4044, 18.5772, 0.60], // Park Reagana (Żółto-zielony)
            [54.3837, 18.6027, 0.45]  // Rejon Wrzeszcza (Niebieska plama)
        ];

        // 4. Odpalamy rysowanie kolorowych plam na mapie
        L.heatLayer(punktyTłumu, {
            radius: 40,     // Wielkość plamy (idealna na ekran telefonu)
            blur: 15,       // Rozmycie brzegów
            maxZoom: 15,
            gradient: {     // Skala kolorów tłumu
                0.4: 'blue',
                0.6: 'lime',
                0.8: 'yellow',
                1.0: 'red'
            }
        }).addTo(map);
    </script>
</body>
</html>
